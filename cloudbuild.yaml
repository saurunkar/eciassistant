steps:
  # --- Backend: lint, test, build image ---
  - name: 'python:3.11-slim'
    id: backend-lint
    dir: backend
    entrypoint: bash
    args:
      - '-c'
      - |
        pip install uv -q
        uv venv && source .venv/bin/activate
        uv pip install -e ".[dev]" -q
        ruff check app/ tests/
        black --check app/ tests/
        mypy app/ --ignore-missing-imports

  - name: 'python:3.11-slim'
    id: backend-test
    dir: backend
    entrypoint: bash
    waitFor: [backend-lint]
    args:
      - '-c'
      - |
        pip install uv -q
        uv venv && source .venv/bin/activate
        uv pip install -e ".[dev]" -q
        pytest tests/unit/ -v --cov=app --cov-fail-under=80 --cov-report=term-missing

  - name: 'gcr.io/cloud-builders/docker'
    id: backend-build
    dir: backend
    waitFor: [backend-test]
    args:
      - build
      - '-t'
      - '${_REGION}-docker.pkg.dev/$PROJECT_ID/electguide/api:${SHORT_SHA}'
      - '-t'
      - '${_REGION}-docker.pkg.dev/$PROJECT_ID/electguide/api:latest'
      - '.'

  - name: 'gcr.io/cloud-builders/docker'
    id: backend-push
    waitFor: [backend-build]
    args:
      - push
      - '--all-tags'
      - '${_REGION}-docker.pkg.dev/$PROJECT_ID/electguide/api'

  # --- Deploy to Cloud Run ---
  - name: 'gcr.io/google.com/cloudsdktool/cloud-sdk'
    id: deploy-cloud-run
    waitFor: [backend-push]
    entrypoint: gcloud
    args:
      - run
      - deploy
      - electguide-api
      - '--image=${_REGION}-docker.pkg.dev/$PROJECT_ID/electguide/api:${SHORT_SHA}'
      - '--region=${_REGION}'
      - '--platform=managed'
      - '--min-instances=0'
      - '--max-instances=10'
      - '--memory=1Gi'
      - '--cpu=1'
      - '--timeout=60'
      - '--concurrency=80'
      - '--no-allow-unauthenticated'

substitutions:
  _REGION: asia-south1

options:
  logging: CLOUD_LOGGING_ONLY
  machineType: E2_HIGHCPU_8

images:
  - '${_REGION}-docker.pkg.dev/$PROJECT_ID/electguide/api:${SHORT_SHA}'
  - '${_REGION}-docker.pkg.dev/$PROJECT_ID/electguide/api:latest'
